[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api?action=:splat"
  status = 200

[[redirects]]
  from = "/login"
  to = "/index.html"
  status = 200
